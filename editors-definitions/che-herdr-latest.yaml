        </g>
      </svg>

commands:
  - id: init-herdr-command
    apply:
      component: herdr-injector
  - id: start-herdr-command
    exec:
      component: herdr-runtime
      commandLine: nohup /herdr-vol/ttyd -W -p 7681 -t titleFixed=Herdr /bin/sh -c 'cd "${PROJECT_SOURCE:-.}" && exec /herdr-vol/herdr' > /herdr-vol/herdr.log 2>&1 &
events:
  preStart:
    - init-herdr-command
  postStart:
    - start-herdr-command
components:
  - name: herdr-injector
    container:
      image: docker.io/tsl0922/ttyd:1.7.8-alpine
      command:
        - sh
        - -c
        - |
          set -e
          cp /usr/bin/ttyd /herdr-vol/ttyd
          case "$(uname -m)" in
            x86_64) HERDR_URL="https://github.com/ogulcancelik/herdr/releases/download/v0.7.3/herdr-linux-x86_64" ;;
            aarch64|arm64) HERDR_URL="https://github.com/ogulcancelik/herdr/releases/download/v0.7.3/herdr-linux-aarch64" ;;
            *) echo "unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          wget -O /herdr-vol/herdr "${HERDR_URL}"
          chmod +x /herdr-vol/ttyd /herdr-vol/herdr
      volumeMounts:
        - name: herdr-volume
          path: /herdr-vol
      memoryLimit: 128Mi
      memoryRequest: 32Mi
      cpuLimit: 500m
      cpuRequest: 30m
  - name: herdr-runtime
    attributes:
      app.kubernetes.io/component: herdr-runtime
      app.kubernetes.io/part-of: herdr.eclipse.org
      controller.devfile.io/container-contribution: true
    container:
      image: docker.io/tsl0922/ttyd:1.7.8-alpine
      memoryLimit: 1024Mi
      memoryRequest: 256Mi
      cpuLimit: 2000m
      cpuRequest: 500m
      volumeMounts:
        - name: herdr-volume
          path: /herdr-vol
      endpoints:
        - name: herdr
          targetPort: 7681
          exposure: public
          protocol: https
          attributes:
            type: main
            cookiesAuthEnabled: true
            discoverable: false
            urlRewriteSupported: true
            secure: true
  - name: herdr-volume
    volume: {}
