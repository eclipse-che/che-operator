schemaVersion: 2.3.0
metadata:
  name: che-herdr
  displayName: Herdr
  description: Agent-aware terminal multiplexer for Eclipse Che
  tags:
    - terminal
    - herdr
    - agents
  attributes:
    arch:
      - x86_64
      - arm64
    publisher: che-incubator
    version: latest
    title: Herdr for Eclipse Che
    repository: https://github.com/ogulcancelik/herdr
    firstPublicationDate: '2026-07-14'
    iconMediatype: image/svg+xml
    iconData: |
      <svg role="img" aria-label="Herdr logo" xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet">
        <rect width="512" height="512" fill="#d9dad8"/>
